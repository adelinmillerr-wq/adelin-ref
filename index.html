<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adelin Miller</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@1,300;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f;
      --card: #0d0d1a;
      --border: #1a1a2e;
      --grad: linear-gradient(135deg, #f093fb, #f5576c);
      --grad-text: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --white: #ffffff;
      --muted: rgba(255,255,255,0.40);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .45;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
      animation: drift 13s ease-in-out infinite alternate;
    }
    .blob-1 { width: 560px; height: 560px; background: rgba(240,147,251,0.09); top: -160px; left: -140px; }
    .blob-2 { width: 420px; height: 420px; background: rgba(245,87,108,0.07); bottom: 80px; right: -110px; animation-delay: 5s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(45px,35px) scale(1.09); } }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 68px 24px 88px;
    }

    /* PHOTO */
    .photo-wrap {
      width: min(260px, 68vw);
      height: min(260px, 68vw);
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(240,147,251,0.3);
      box-shadow: 0 0 48px rgba(240,147,251,0.14);
      margin-bottom: 36px;
      animation: fadeUp 0.9s ease both;
      flex-shrink: 0;
    }
    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* TAGLINE */
    .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      color: var(--muted);
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 12px;
      animation: fadeUp 0.9s 0.1s ease both;
    }

    /* NAME */
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.8rem, 12vw, 9rem);
      line-height: 0.9;
      text-align: center;
      letter-spacing: 0.025em;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 44px;
      animation: fadeUp 0.9s 0.18s ease both;
    }

    /* GENERATE BUTTONS */
    .buttons-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
      animation: fadeUp 0.9s 0.28s ease both;
      width: 100%;
      max-width: 320px;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 12px;
    }
    .btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn-primary {
      background: var(--grad);
      color: #fff;
      box-shadow: 0 6px 38px rgba(240,147,251,0.22);
    }
    .btn-primary:hover { box-shadow: 0 12px 52px rgba(240,147,251,0.40); }
    .btn-secondary {
      background: transparent;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .btn-secondary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--grad);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .btn-secondary:hover::before { opacity: 1; }
    .btn-secondary .label { position: relative; z-index: 1; }
    .btn-inner {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 16px 28px;
    }
    .btn-icon { font-size: 0.95rem; position: relative; z-index: 1; }

    .btn-note {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.70rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      margin-top: 4px;
    }

    /* FANCY DIVIDER */
    .fancy-divider {
      width: 100%;
      max-width: 320px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 36px auto 32px;
      animation: fadeUp 0.9s 0.38s ease both;
    }
    .fancy-divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(240,147,251,0.4), transparent);
    }
    .fancy-divider-gem {
      width: 7px;
      height: 7px;
      background: var(--grad);
      transform: rotate(45deg);
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(240,147,251,0.6);
    }

    /* SOCIAL BUTTONS */
    .social-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.9s 0.44s ease both;
      width: 100%;
      max-width: 320px;
    }
    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(255,255,255,0.6);
      padding: 13px 22px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      transition: color 0.3s, border-color 0.3s, transform 0.25s;
      position: relative;
      overflow: hidden;
    }
    .social-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--grad);
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .social-btn:hover::before { opacity: 0.1; }
    .social-btn:hover { color: #fff; border-color: rgba(240,147,251,0.45); transform: translateY(-2px); }
    .social-btn span, .social-btn svg { position: relative; z-index: 1; }

    /* FOOTER SLOGAN */
    .slogan-wrap {
      text-align: center;
      padding: 0 24px;
      margin-top: 56px;
      animation: fadeUp 0.9s 0.52s ease both;
    }
    .slogan-main {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.8rem);
      letter-spacing: 0.08em;
      background: var(--grad-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
      margin-bottom: 10px;
    }
    .slogan-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .slogan-divider {
      width: 28px;
      height: 1px;
      background: var(--grad);
      margin: 14px auto 0;
      opacity: 0.35;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
